name: Daily Stock Analysis

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * 1-5"

concurrency:
  group: daily-stock-analysis-${{ github.ref }}
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    strategy:
      fail-fast: false
      matrix:
        group: [1, 2]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Select stock list
        id: stocks
        env:
          LIST_1: ${{ secrets.STOCK_LIST }}
          LIST_2: ${{ secrets.STOCK_LIST_2 }}
        run: |
          if [ "${{ matrix.group }}" = "1" ]; then
            codes="$LIST_1"
            list_name="STOCK_LIST"
          else
            codes="$LIST_2"
            list_name="STOCK_LIST_2"
          fi

          if [ -z "$codes" ]; then
            echo "::warning::$list_name is empty. Skip this group."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            count=$(echo "$codes" | tr ',' '\n' | grep -v '^[[:space:]]*$' | wc -l)
            echo "$list_name loaded. Stock count: $count"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "codes=$codes" >> "$GITHUB_OUTPUT"
          fi

      - name: Run analysis
        if: steps.stocks.outputs.skip != 'true'
        env:
          ANSPIRE_API_KEYS: ${{ secrets.ANSPIRE_API_KEYS }}
          AIHUBMIX_KEY: ${{ secrets.AIHUBMIX_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python main.py --stocks "${{ steps.stocks.outputs.codes }}" --force-run
